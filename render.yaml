services:
  - type: web
    name: abn-event-registration
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    plan: free
    region: singapore
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: abn-event-registration-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://abn-event-registration.onrender.com
      - key: COOKIE_SECURE
        value: "true"
      - key: EVENT_TIMEZONE
        value: Asia/Kolkata
      - key: GOOGLE_SHEETS_SYNC_ENABLED
        value: "false"

databases:
  - name: abn-event-registration-db
    plan: free
    region: singapore
    databaseName: abn_registration
    user: abn_user
    postgresMajorVersion: "16"
