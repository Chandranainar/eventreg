services:
  backend:
    restart: always
    environment:
      APP_ENV: production
      COOKIE_SECURE: "true"

  frontend:
    restart: always

  nginx:
    restart: always
    ports: !override
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deployment/certbot/www:/var/www/certbot:ro
      - ./deployment/certbot/conf:/etc/letsencrypt:ro

  db:
    restart: always
